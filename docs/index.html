<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レポートダッシュボード</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
        }
        .header h1 {
            font-size: 2.2em;
            font-weight: 700;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1em;
            opacity: 0.6;
            letter-spacing: 0.1em;
        }
        .cards {
            display: flex;
            gap: 28px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 18px;
            padding: 44px 40px;
            width: 300px;
            color: white;
            transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
            backdrop-filter: blur(10px);
        }
        .card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.13);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4);
        }
        .card-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .card-title {
            font-size: 1.25em;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.03em;
        }
        .card-desc {
            font-size: 0.85em;
            opacity: 0.65;
            text-align: center;
            line-height: 1.6;
        }
        .card-speed { border-color: rgba(102, 126, 234, 0.5); }
        .card-speed:hover { box-shadow: 0 16px 40px rgba(102, 126, 234, 0.3); }
        .card-context { border-color: rgba(0, 120, 212, 0.5); }
        .card-context:hover { box-shadow: 0 16px 40px rgba(0, 120, 212, 0.3); }
        footer {
            margin-top: 50px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.8em;
        }
        @media (max-width: 600px) {
            .header h1 { font-size: 1.6em; }
            .card { width: 100%; padding: 36px 28px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 レポートダッシュボード</h1>
        <p>REPORT DASHBOARD</p>
    </div>

    <div class="cards">
        <a href="./speed-monitor.html" class="card card-speed">
            <div class="card-icon">🚀</div>
            <div class="card-title">スピードテスト</div>
            <div class="card-desc">回線速度の測定結果<br>毎日自動計測・記録</div>
        </a>
        <a href="./context-reports.html" class="card card-context">
            <div class="card-icon">📰</div>
            <div class="card-title">コンテキスト</div>
            <div class="card-desc">コンテキスト収集レポート<br>記事・情報のまとめ</div>
        </a>
    </div>

    <footer>hisasaka.github.io / context-reports</footer>
</body>
</html>
